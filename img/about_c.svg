<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="'Noto Sans JP','Hiragino Sans',sans-serif">
  <defs>
    <radialGradient id="coralTop" cx="85%" cy="8%" r="55%">
      <stop offset="0%" stop-color="#FFD9C7" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#FFD9C7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralBottom" cx="10%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#FFE3C7" stop-opacity=".85"/>
      <stop offset="100%" stop-color="#FFE3C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDF9"/>
      <stop offset="100%" stop-color="#FCF4E9"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#bgBase)"/>
  <rect x="0" y="0" width="1600" height="900" fill="url(#coralTop)"/>
  <rect x="0" y="0" width="1600" height="900" fill="url(#coralBottom)"/>

  <!-- ===================== decorative confetti / hearts / stars ===================== -->
  <g opacity=".9">
    <!-- top-left cluster -->
    <rect x="120" y="140" width="18" height="18" rx="4" fill="#FF8A3C" transform="rotate(18 129 149)"/>
    <rect x="180" y="90" width="14" height="14" rx="3" fill="#FFC98A" transform="rotate(-24 187 97)"/>
    <circle cx="230" cy="160" r="8" fill="#FF5A3C"/>
    <path d="M150,220 C147,213 137,214 136,223 C135,231 143,238 150,245 C157,238 165,231 164,223 C163,214 153,213 150,220 Z" fill="#FF5A3C" opacity=".85"/>
    <path d="M90,260 l6,16 6,-16 6,16 M 0 0" stroke="none"/>
    <g stroke="#FF8A3C" stroke-width="3.5" stroke-linecap="round">
      <path d="M78,120 L90,138 M70,132 L100,126"/>
    </g>

    <!-- bottom-left cluster -->
    <rect x="140" y="700" width="16" height="16" rx="3" fill="#FFB199" transform="rotate(12 148 708)"/>
    <circle cx="200" cy="760" r="7" fill="#FF8A3C"/>
    <path d="M110,780 C107,773 97,774 96,783 C95,791 103,798 110,805 C117,798 125,791 124,783 C123,774 113,773 110,780 Z" fill="#FF5A3C" opacity=".8"/>
    <rect x="70" y="820" width="14" height="14" rx="3" fill="#FFC98A" transform="rotate(-15 77 827)"/>
    <g stroke="#FF5A3C" stroke-width="3.5" stroke-linecap="round">
      <path d="M230,830 L240,846 M222,840 L250,836"/>
    </g>

    <!-- top-right cluster -->
    <rect x="1420" y="120" width="18" height="18" rx="4" fill="#FF5A3C" transform="rotate(-20 1429 129)"/>
    <circle cx="1480" cy="170" r="8" fill="#FFB199"/>
    <path d="M1360,150 C1357,143 1347,144 1346,153 C1345,161 1353,168 1360,175 C1367,168 1375,161 1374,153 C1373,144 1363,143 1360,150 Z" fill="#FF8A3C"/>
    <rect x="1500" y="90" width="14" height="14" rx="3" fill="#FFC98A" transform="rotate(30 1507 97)"/>
    <g stroke="#FF8A3C" stroke-width="3.5" stroke-linecap="round">
      <path d="M1440,210 L1452,228 M1432,222 L1462,216"/>
    </g>

    <!-- bottom-right cluster -->
    <rect x="1430" y="720" width="16" height="16" rx="3" fill="#FF5A3C" transform="rotate(22 1438 728)"/>
    <circle cx="1500" cy="780" r="7" fill="#FF8A3C"/>
    <path d="M1370,760 C1367,753 1357,754 1356,763 C1355,771 1363,778 1370,785 C1377,778 1385,771 1384,763 C1383,754 1373,753 1370,760 Z" fill="#FFB199" opacity=".85"/>
    <rect x="1490" y="830" width="14" height="14" rx="3" fill="#FFC98A" transform="rotate(-10 1497 837)"/>
    <g stroke="#FF5A3C" stroke-width="3.5" stroke-linecap="round">
      <path d="M1360,830 L1372,848 M1352,842 L1382,836"/>
    </g>
  </g>

  <!-- soft floating hearts, kept away from center text -->
  <g fill="#FF5A3C" opacity=".55">
    <path d="M330,470 C326,461 314,462 313,473 C312,483 322,491 330,499 C338,491 348,483 347,473 C346,462 334,461 330,470 Z"/>
  </g>
  <g fill="#FF8A3C" opacity=".5">
    <path d="M1260,500 C1256,491 1244,492 1243,503 C1242,513 1252,521 1260,529 C1268,521 1278,513 1277,503 C1276,492 1264,491 1260,500 Z"/>
  </g>

  <!-- ===================== CENTER: text ===================== -->
  <g text-anchor="middle">
    <text x="800" y="360" font-size="22" font-weight="700" letter-spacing="6" fill="#FF5A3C">ABOUT</text>
    <text x="800" y="460" font-size="66" font-weight="900" fill="#2B2420">応援が、ちゃんと届く場所。</text>
    <text x="800" y="530" font-size="24" font-weight="500" fill="#5B5148">その場で流れて消えるのではなく、</text>
    <text x="800" y="566" font-size="24" font-weight="500" fill="#5B5148">本人に届き、残る応援を。</text>
  </g>
</svg>
